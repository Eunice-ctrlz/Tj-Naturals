{% extends 'base.html' %}

{% block title %}Password Reset Complete - TJ Naturals{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow text-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="bi bi-check-circle-fill text-success display-4"></i>
                    </div>
                    <h2 class="text-success mb-3">Password Reset Complete</h2>
                    <p class="lead mb-4">
                        Your password has been set. You may go ahead and log in now.
                    </p>
                    <div class="mt-4">
                        <a href="{% url 'accounts:login' %}" class="btn btn-success btn-lg">Log in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

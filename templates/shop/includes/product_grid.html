<div class="row g-4">
    {% for product in products %}
    <div class="col-6 col-md-4 col-lg-3 col-xxl-3">
        {% include 'shop/includes/product_card.html' with product=product %}
    </div>
    {% empty %}
    <div class="col-12 text-center py-5">
        <i class="bi bi-inbox" style="font-size: 4rem; color: #ccc;"></i>
        <h4 class="mt-3 text-muted">No products found</h4>
        <p class="text-muted">Try adjusting your search or category filter</p>
        <a href="{% url 'shop:product_list' %}" class="btn btn-success">View All Products</a>
    </div>
    {% endfor %}
</div>

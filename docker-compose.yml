services:
  # ===========================
  # POSTGRESQL DATABASE
  # ===========================
  db:
    image: postgres:15-alpine
    container_name: tj-naturals-db
    environment:
      
      POSTGRES_DB: ${DB_NAME:-tj_naturals}
      POSTGRES_USER: ${DB_USER:-tjadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
    volumes:
      # Persist database data even if container stops
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tjadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tj-network


  # ===========================
  # REDIS CACHE & MESSAGE BROKER
  # ===========================
  redis:
    image: redis:7-alpine
    container_name: tj-naturals-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tj-network


  # ===========================
  # DJANGO WEB APPLICATION
  # ===========================
  web:
    build: .
    container_name: tj-naturals-web
    # Run migrations and start server
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 TJNaturals.wsgi:application"
    
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      
      # Database connection
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-tj_naturals}
      DB_USER: ${DB_USER:-tjadmin}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      DB_HOST: db
      DB_PORT: 5432
      
      # Redis
      REDIS_URL: redis://redis:6379/0
      
      # CSRF
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
    
    ports:
      - "8000:8000"
    
    volumes:
      # Mount code for development (comment out for production)
      - .:/app
      # Mount images folder
      - ./images:/app/images
      # Persist static and media files
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    networks:
      - tj-network


  # ===========================
  # CELERY WORKER
  # ===========================
  celery:
    build: .
    container_name: tj-naturals-celery
    command: celery -A TJNaturals worker -l info
    
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-tj_naturals}
      DB_USER: ${DB_USER:-tjadmin}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      DB_HOST: db
      DB_PORT: 5432
      
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    
    volumes:
      - .:/app
      - logs_volume:/app/logs
    
    depends_on:
      - db
      - redis
      - web
    
    networks:
      - tj-network


  # ===========================
  # CELERY BEAT (SCHEDULER)
  # ===========================
  celery-beat:
    build: .
    container_name: tj-naturals-celery-beat
    command: celery -A TJNaturals beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-tj_naturals}
      DB_USER: ${DB_USER:-tjadmin}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      DB_HOST: db
      DB_PORT: 5432
      
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    
    volumes:
      - .:/app
      - logs_volume:/app/logs
    
    depends_on:
      - db
      - redis
      - web
    
    networks:
      - tj-network


# ===========================
# VOLUMES (PERSISTENT STORAGE)
# ===========================
volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local


# ===========================
# NETWORKS
# ===========================
networks:
  tj-network:
    driver: bridge

  